<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fire Effect Test — Player Cards</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Source+Sans+3:wght@600;700&family=Inter:wght@600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:#0c141f;color:#e8f0fa;
  font-family:'Inter',sans-serif;
  min-height:100vh;
  display:flex;flex-direction:column;align-items:center;
  padding:40px 20px;
}
h1{font-family:'Oswald',sans-serif;font-size:28px;font-weight:700;letter-spacing:1px;margin-bottom:8px;color:#e8f0fa;}
.subtitle{font-size:13px;color:#5a7799;margin-bottom:40px;font-weight:600;}

.tiers{display:flex;gap:60px;flex-wrap:wrap;justify-content:center;align-items:flex-start;}
.tier{display:flex;flex-direction:column;align-items:center;gap:16px;}
.tier-label{
  font-family:'Oswald',sans-serif;font-size:14px;font-weight:700;
  letter-spacing:1.5px;text-transform:uppercase;
  padding:4px 14px;border-radius:20px;
}
.tier-label.t1{background:rgba(34,197,94,.12);color:#4ade80;border:1px solid rgba(34,197,94,.25);}
.tier-label.t2{background:rgba(249,115,22,.12);color:#f97316;border:1px solid rgba(249,115,22,.25);}
.tier-label.t3{background:rgba(255,60,20,.12);color:#ff6b35;border:1px solid rgba(255,60,20,.3);}
.tier-desc{font-size:11px;color:#5a7799;font-weight:600;text-align:center;max-width:140px;line-height:1.4;}

/* ─── CARD (replica of .fm-pc) ─── */
.fm-pc{
  display:flex;flex-direction:column;align-items:center;
  cursor:pointer;position:relative;
  transition:transform .18s cubic-bezier(.34,1.56,.64,1);
  width:120px;
}
.fm-pc:hover{transform:translateY(-3px);}
.fm-pc:active{transform:scale(.96);}
.fm-pc-body{
  width:112px;
  background:#1A1F2A;
  border:1px solid rgba(255,255,255,.12);
  border-radius:9px;
  padding:12px 10px 12px;
  text-align:center;position:relative;overflow:hidden;
  box-shadow:0 4px 16px rgba(0,0,0,.6);
  transition:border-color .2s,box-shadow .2s;
}
.fm-pc-body::after{
  content:'';position:absolute;
  top:12%;bottom:12%;right:0;
  width:3px;background:#2E7D32;
  border-radius:2px 0 0 2px;opacity:.5;
}
.fm-pc-n{
  position:relative;z-index:1;
  font-family:'Source Sans 3',sans-serif;
  font-size:14px;font-weight:700;color:#fff;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  max-width:100%;line-height:1.2;margin-bottom:2px;
  letter-spacing:.3px;
}
.fm-pc-p{
  position:relative;z-index:1;
  font-family:'Oswald',sans-serif;
  font-size:40px;font-weight:700;letter-spacing:-.5px;
  line-height:1;color:#fff;
  transition:color .3s;
}
.fm-pc-events{display:flex;gap:4px;justify-content:center;align-items:center;margin-top:5px;flex-wrap:wrap;min-height:22px;}
.fm-ev{display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;}
.fm-ev.goal{filter:drop-shadow(0 0 2px #FF4444) drop-shadow(0 0 5px rgba(255,68,68,.4));}
.fm-ev.assist{filter:drop-shadow(0 0 2px #4488FF) drop-shadow(0 0 5px rgba(68,136,255,.4));}

/* ─── SCORE COLORS ─── */
.pts-white{color:#fff;}
.pts-green{color:#4ade80;}
.pts-orange{color:#f97316;}

/* ─── TIER 1: Neon green accentuated border ─── */
.fm-pc.fire-t1 .fm-pc-body{
  border-color:rgba(74,222,128,.55);
  box-shadow:
    0 4px 16px rgba(0,0,0,.6),
    0 0 8px rgba(74,222,128,.15),
    0 0 20px rgba(74,222,128,.08);
}
.fm-pc.fire-t1 .fm-pc-body::after{
  background:#4ade80;opacity:.8;
}

/* ─── TIER 2: Small inner fire ─── */
.fm-pc.fire-t2 .fm-pc-body{
  border-color:rgba(249,115,22,.55);
  box-shadow:
    0 4px 16px rgba(0,0,0,.6),
    0 0 10px rgba(249,115,22,.2),
    0 0 25px rgba(249,115,22,.1);
}
.fm-pc.fire-t2 .fm-pc-body::after{
  background:#f97316;opacity:1;
}

/* inner fire glow — small */
.fm-pc.fire-t2 .fm-pc-body::before{
  content:'';position:absolute;
  bottom:-8px;left:10%;right:10%;height:40px;
  background:radial-gradient(ellipse at center bottom, rgba(249,115,22,.35) 0%, rgba(249,115,22,.12) 40%, transparent 70%);
  z-index:0;
  animation:fireGlowSmall 2s ease-in-out infinite alternate;
  pointer-events:none;
  border-radius:50%;
}

/* fire particles — small */
.fire-particles-sm{
  position:absolute;inset:0;z-index:0;pointer-events:none;
  overflow:hidden;border-radius:8px;
}
.fire-particles-sm .fp{
  position:absolute;bottom:-2px;
  width:3px;height:3px;
  border-radius:50%;
  background:#f97316;
  opacity:0;
  animation:particleRise 1.8s ease-out infinite;
}
.fire-particles-sm .fp:nth-child(1){left:15%;animation-delay:0s;animation-duration:1.6s;}
.fire-particles-sm .fp:nth-child(2){left:35%;animation-delay:.4s;animation-duration:2s;}
.fire-particles-sm .fp:nth-child(3){left:55%;animation-delay:.2s;animation-duration:1.7s;}
.fire-particles-sm .fp:nth-child(4){left:75%;animation-delay:.6s;animation-duration:1.9s;}
.fire-particles-sm .fp:nth-child(5){left:45%;animation-delay:.8s;animation-duration:2.1s;}
.fire-particles-sm .fp:nth-child(6){left:25%;animation-delay:1s;animation-duration:1.5s;}
.fire-particles-sm .fp:nth-child(7){left:65%;animation-delay:.3s;animation-duration:1.8s;}
.fire-particles-sm .fp:nth-child(8){left:85%;animation-delay:.7s;animation-duration:2.2s;}

/* ─── TIER 3: Large fire — full blaze ─── */
.fm-pc.fire-t3 .fm-pc-body{
  border-color:rgba(255,100,30,.8);
  box-shadow:
    0 4px 16px rgba(0,0,0,.6),
    0 0 18px rgba(249,115,22,.45),
    0 0 40px rgba(255,80,20,.25),
    0 0 60px rgba(255,60,10,.12),
    inset 0 -12px 28px rgba(249,115,22,.12);
  overflow:visible;
}
.fm-pc.fire-t3 .fm-pc-body::after{
  background:#ff6b35;opacity:1;
  box-shadow:0 0 8px rgba(255,107,53,.8);
}

/* inner fire glow — large, bleeds out */
.fm-pc.fire-t3 .fm-pc-body::before{
  content:'';position:absolute;
  bottom:-18px;left:-10%;right:-10%;height:70px;
  background:radial-gradient(ellipse at center bottom, rgba(255,80,10,.55) 0%, rgba(249,115,22,.25) 35%, rgba(255,60,10,.08) 60%, transparent 80%);
  z-index:-1;
  animation:fireGlowBig 1.2s ease-in-out infinite alternate;
  pointer-events:none;
  border-radius:50%;
}

/* fire particles — large, overflow visible */
.fire-particles-lg{
  position:absolute;inset:-6px;z-index:2;pointer-events:none;
  overflow:visible;
}
.fire-particles-lg .fp{
  position:absolute;bottom:0;
  border-radius:50%;
  opacity:0;
  animation:particleRise 1.5s ease-out infinite;
}
.fire-particles-lg .fp:nth-child(odd){background:#f97316;width:4px;height:4px;}
.fire-particles-lg .fp:nth-child(even){background:#ff6b35;width:3px;height:3px;}
/* bottom particles */
.fire-particles-lg .fp:nth-child(1){left:10%;animation-delay:0s;animation-duration:1.2s;}
.fire-particles-lg .fp:nth-child(2){left:22%;animation-delay:.15s;animation-duration:1.5s;}
.fire-particles-lg .fp:nth-child(3){left:35%;animation-delay:.35s;animation-duration:1.3s;}
.fire-particles-lg .fp:nth-child(4){left:48%;animation-delay:.1s;animation-duration:1.6s;}
.fire-particles-lg .fp:nth-child(5){left:60%;animation-delay:.45s;animation-duration:1.4s;}
.fire-particles-lg .fp:nth-child(6){left:72%;animation-delay:.25s;animation-duration:1.2s;}
.fire-particles-lg .fp:nth-child(7){left:85%;animation-delay:.55s;animation-duration:1.7s;}
.fire-particles-lg .fp:nth-child(8){left:95%;animation-delay:.1s;animation-duration:1.3s;}
/* side particles — left */
.fire-particles-lg .fp:nth-child(9){left:-3px;bottom:20%;animation-delay:.2s;animation-duration:1.4s;animation-name:particleSideL;}
.fire-particles-lg .fp:nth-child(10){left:-3px;bottom:50%;animation-delay:.6s;animation-duration:1.6s;animation-name:particleSideL;}
.fire-particles-lg .fp:nth-child(11){left:-3px;bottom:75%;animation-delay:.4s;animation-duration:1.3s;animation-name:particleSideL;}
/* side particles — right */
.fire-particles-lg .fp:nth-child(12){right:-3px;left:auto;bottom:25%;animation-delay:.3s;animation-duration:1.5s;animation-name:particleSideR;}
.fire-particles-lg .fp:nth-child(13){right:-3px;left:auto;bottom:55%;animation-delay:.7s;animation-duration:1.4s;animation-name:particleSideR;}
.fire-particles-lg .fp:nth-child(14){right:-3px;left:auto;bottom:70%;animation-delay:.15s;animation-duration:1.6s;animation-name:particleSideR;}
/* extra bright embers */
.fire-particles-lg .fp:nth-child(15){left:30%;width:5px;height:5px;background:#ffaa33;animation-delay:.5s;animation-duration:1.1s;}
.fire-particles-lg .fp:nth-child(16){left:65%;width:5px;height:5px;background:#ffaa33;animation-delay:.2s;animation-duration:1.3s;}

/* outer flame tongues for T3 — radiating outside */
.flame-wisps{
  position:absolute;
  inset:-12px;z-index:-1;pointer-events:none;
}
.flame-wisps .wisp{
  position:absolute;
  width:10px;border-radius:50% 50% 50% 50% / 60% 60% 40% 40%;
  opacity:0;
}
/* bottom flames — tallest, most visible */
.flame-wisps .wisp.bot{bottom:-4px;animation:wispRise 1.6s ease-out infinite;}
.flame-wisps .wisp.bot:nth-child(1){left:5%;height:28px;background:rgba(255,90,20,.65);animation-delay:0s;animation-duration:1.4s;}
.flame-wisps .wisp.bot:nth-child(2){left:20%;height:35px;background:rgba(255,70,10,.55);animation-delay:.25s;animation-duration:1.7s;width:12px;}
.flame-wisps .wisp.bot:nth-child(3){left:40%;height:30px;background:rgba(249,115,22,.6);animation-delay:.5s;animation-duration:1.5s;}
.flame-wisps .wisp.bot:nth-child(4){left:58%;height:32px;background:rgba(255,80,20,.55);animation-delay:.12s;animation-duration:1.8s;width:11px;}
.flame-wisps .wisp.bot:nth-child(5){left:75%;height:26px;background:rgba(249,115,22,.6);animation-delay:.4s;animation-duration:1.6s;}
.flame-wisps .wisp.bot:nth-child(6){right:2%;left:auto;height:22px;background:rgba(255,100,30,.5);animation-delay:.65s;animation-duration:1.5s;}
/* left side flames */
.flame-wisps .wisp.side-l{left:-4px;width:8px;animation:wispSideL 1.8s ease-out infinite;}
.flame-wisps .wisp.side-l:nth-child(7){bottom:10%;height:16px;background:rgba(249,115,22,.45);animation-delay:0s;animation-duration:1.6s;}
.flame-wisps .wisp.side-l:nth-child(8){bottom:40%;height:14px;background:rgba(255,90,20,.4);animation-delay:.4s;animation-duration:1.9s;}
.flame-wisps .wisp.side-l:nth-child(9){bottom:65%;height:12px;background:rgba(249,115,22,.35);animation-delay:.8s;animation-duration:1.7s;}
/* right side flames */
.flame-wisps .wisp.side-r{right:-4px;left:auto;width:8px;animation:wispSideR 1.8s ease-out infinite;}
.flame-wisps .wisp.side-r:nth-child(10){bottom:15%;height:15px;background:rgba(255,80,20,.45);animation-delay:.2s;animation-duration:1.7s;}
.flame-wisps .wisp.side-r:nth-child(11){bottom:45%;height:13px;background:rgba(249,115,22,.4);animation-delay:.6s;animation-duration:1.5s;}
.flame-wisps .wisp.side-r:nth-child(12){bottom:70%;height:11px;background:rgba(255,100,30,.35);animation-delay:.35s;animation-duration:1.8s;}

/* outer ambient glow behind the whole card */
.fire-outer-glow{
  position:absolute;inset:-16px;z-index:-2;pointer-events:none;
  border-radius:20px;
  background:radial-gradient(ellipse at center 70%, rgba(255,80,10,.2) 0%, rgba(249,115,22,.08) 40%, transparent 70%);
  animation:outerGlowPulse 2s ease-in-out infinite alternate;
}

/* ─── KEYFRAMES ─── */
@keyframes fireGlowSmall{
  0%{opacity:.6;transform:scaleX(.9);}
  100%{opacity:1;transform:scaleX(1.05);}
}
@keyframes fireGlowBig{
  0%{opacity:.7;transform:scaleX(.92) scaleY(.9);}
  100%{opacity:1;transform:scaleX(1.08) scaleY(1.1);}
}
@keyframes particleRise{
  0%{opacity:0;transform:translateY(0) scale(1);}
  15%{opacity:.9;}
  100%{opacity:0;transform:translateY(-70px) scale(.2);}
}
@keyframes particleSideL{
  0%{opacity:0;transform:translate(0,0) scale(1);}
  15%{opacity:.8;}
  100%{opacity:0;transform:translate(-18px,-30px) scale(.2);}
}
@keyframes particleSideR{
  0%{opacity:0;transform:translate(0,0) scale(1);}
  15%{opacity:.8;}
  100%{opacity:0;transform:translate(18px,-30px) scale(.2);}
}
@keyframes wispRise{
  0%{opacity:0;transform:translateY(0) scaleY(1) scaleX(1);}
  10%{opacity:.8;}
  50%{opacity:.5;transform:translateY(-30px) scaleY(1.4) scaleX(.6);}
  100%{opacity:0;transform:translateY(-50px) scaleY(.4) scaleX(.3);}
}
@keyframes wispSideL{
  0%{opacity:0;transform:translate(0,0) scaleY(1) scaleX(1);}
  10%{opacity:.6;}
  50%{opacity:.3;transform:translate(-10px,-15px) scaleY(1.2) scaleX(.7);}
  100%{opacity:0;transform:translate(-18px,-25px) scaleY(.4) scaleX(.3);}
}
@keyframes wispSideR{
  0%{opacity:0;transform:translate(0,0) scaleY(1) scaleX(1);}
  10%{opacity:.6;}
  50%{opacity:.3;transform:translate(10px,-15px) scaleY(1.2) scaleX(.7);}
  100%{opacity:0;transform:translate(18px,-25px) scaleY(.4) scaleX(.3);}
}
@keyframes outerGlowPulse{
  0%{opacity:.5;transform:scale(.97);}
  100%{opacity:1;transform:scale(1.03);}
}

/* ─── BORDER PULSE for T3 ─── */
.fm-pc.fire-t3 .fm-pc-body{
  animation:borderPulse 2.5s ease-in-out infinite;
}
@keyframes borderPulse{
  0%,100%{box-shadow:0 4px 16px rgba(0,0,0,.6),0 0 18px rgba(249,115,22,.4),0 0 40px rgba(255,80,20,.2),0 0 60px rgba(255,60,10,.1),inset 0 -12px 28px rgba(249,115,22,.1);}
  50%{box-shadow:0 4px 16px rgba(0,0,0,.6),0 0 25px rgba(249,115,22,.55),0 0 55px rgba(255,80,20,.3),0 0 75px rgba(255,60,10,.15),inset 0 -15px 32px rgba(249,115,22,.15);}
}
</style>
</head>
<body>

<h1>ON FIRE — Player Card Effects</h1>
<p class="subtitle">3 tiers based on per-matchday performance</p>

<div class="tiers">

  <!-- TIER 1: 1 goal / 1 assist → green glow -->
  <div class="tier">
    <span class="tier-label t1">Tier 1</span>
    <div class="tier-desc">1 gol / 1 assist<br>Border neon verde</div>
    <div class="fm-pc fire-t1">
      <div class="fm-pc-body">
        <div class="fm-pc-n">Vinícius Jr.</div>
        <div class="fm-pc-p pts-green">7</div>
      </div>
      <div class="fm-pc-events">
        <span class="fm-ev goal"><svg width="18" height="18" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" fill="none" stroke="#FF4444" stroke-width="1.5"/><circle cx="12" cy="12" r="4" fill="#FF4444"/></svg></span>
      </div>
    </div>
  </div>

  <!-- TIER 2: 10+ pts → small fire -->
  <div class="tier">
    <span class="tier-label t2">Tier 2</span>
    <div class="tier-desc">10+ puncte<br>Foc mic interior</div>
    <div class="fm-pc fire-t2">
      <div class="fm-pc-body">
        <div class="fire-particles-sm">
          <div class="fp"></div><div class="fp"></div><div class="fp"></div><div class="fp"></div>
          <div class="fp"></div><div class="fp"></div><div class="fp"></div><div class="fp"></div>
        </div>
        <div class="fm-pc-n">Vinícius Jr.</div>
        <div class="fm-pc-p pts-orange">12</div>
      </div>
      <div class="fm-pc-events">
        <span class="fm-ev goal"><svg width="18" height="18" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" fill="none" stroke="#FF4444" stroke-width="1.5"/><circle cx="12" cy="12" r="4" fill="#FF4444"/></svg></span>
        <span class="fm-ev goal"><svg width="18" height="18" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" fill="none" stroke="#FF4444" stroke-width="1.5"/><circle cx="12" cy="12" r="4" fill="#FF4444"/></svg></span>
        <span class="fm-ev assist"><svg width="18" height="18" viewBox="0 0 24 24"><path d="M4 12 L14 12 M10 8 L14 12 L10 16" fill="none" stroke="#4488FF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
      </div>
    </div>
  </div>

  <!-- TIER 3: 15+ pts → big fire -->
  <div class="tier">
    <span class="tier-label t3">Tier 3</span>
    <div class="tier-desc">15+ puncte<br>Foc mare portocaliu</div>
    <div class="fm-pc fire-t3">
      <div class="fire-outer-glow"></div>
      <div class="flame-wisps">
        <div class="wisp bot"></div><div class="wisp bot"></div><div class="wisp bot"></div>
        <div class="wisp bot"></div><div class="wisp bot"></div><div class="wisp bot"></div>
        <div class="wisp side-l"></div><div class="wisp side-l"></div><div class="wisp side-l"></div>
        <div class="wisp side-r"></div><div class="wisp side-r"></div><div class="wisp side-r"></div>
      </div>
      <div class="fm-pc-body">
        <div class="fire-particles-lg">
          <div class="fp"></div><div class="fp"></div><div class="fp"></div><div class="fp"></div>
          <div class="fp"></div><div class="fp"></div><div class="fp"></div><div class="fp"></div>
          <div class="fp"></div><div class="fp"></div><div class="fp"></div><div class="fp"></div>
          <div class="fp"></div><div class="fp"></div><div class="fp"></div><div class="fp"></div>
        </div>
        <div class="fm-pc-n">Vinícius Jr.</div>
        <div class="fm-pc-p pts-orange">18</div>
      </div>
      <div class="fm-pc-events">
        <span class="fm-ev goal"><svg width="18" height="18" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" fill="none" stroke="#FF4444" stroke-width="1.5"/><circle cx="12" cy="12" r="4" fill="#FF4444"/></svg></span>
        <span class="fm-ev goal"><svg width="18" height="18" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" fill="none" stroke="#FF4444" stroke-width="1.5"/><circle cx="12" cy="12" r="4" fill="#FF4444"/></svg></span>
        <span class="fm-ev goal"><svg width="18" height="18" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" fill="none" stroke="#FF4444" stroke-width="1.5"/><circle cx="12" cy="12" r="4" fill="#FF4444"/></svg></span>
        <span class="fm-ev assist"><svg width="18" height="18" viewBox="0 0 24 24"><path d="M4 12 L14 12 M10 8 L14 12 L10 16" fill="none" stroke="#4488FF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
      </div>
    </div>
  </div>

</div>

<!-- Also show a normal card for reference -->
<div style="margin-top:50px;display:flex;flex-direction:column;align-items:center;gap:12px;">
  <div style="font-size:11px;color:#5a7799;font-weight:600;letter-spacing:1px;text-transform:uppercase;">Referință — card normal (0-4 pct)</div>
  <div class="fm-pc">
    <div class="fm-pc-body">
      <div class="fm-pc-n">Bellingham</div>
      <div class="fm-pc-p pts-white">3</div>
    </div>
    <div class="fm-pc-events" style="min-height:22px;"></div>
  </div>
</div>

</body>
</html>
